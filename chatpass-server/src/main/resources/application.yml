spring:
  application:
    name: chatpass-server
  
  profiles:
    active: dev
  
  # PostgreSQL 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/chatpass
    username: chatpass
    password: chatpass123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: ChatPassHikariPool
    
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        
  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: false  # 开发环境允许 clean
    
  # Redis 缓存配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000
          
  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 默认 30 分钟
      
server:
  port: 8080
  
logging:
  level:
    root: INFO
    com.chatpass: DEBUG
    org.springframework.cache: DEBUG
    
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,cache
        
jwt:
  secret: chatpass-secret-key-change-in-production-minimum-256-bits
  expiration: 86400000
  
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html