spring:
  application:
    name: chatpass-server
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5432/chatpass
    username: chatpass
    password: chatpass123
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      
server:
  port: 8080
  
logging:
  level:
    root: INFO
    com.chatpass: DEBUG
    
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jwt:
  secret: chatpass-secret-key-change-in-production-minimum-256-bits
  expiration: 86400000
  
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html